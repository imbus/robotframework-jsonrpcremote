paths = ["tests/robot"]
output-dir = "results"
default-profiles = ["windows", "non_windows"]
#log-level = "TRACE"

# Native Windows is the only platform the stdio server rejects (mirrors its
# sys.platform == "win32" guard); test selection splits on exactly that line.
[profiles.windows]
enabled.if = "platform.system() == 'Windows'"
excludes = ["posix"]

[profiles.non_windows]
enabled.if = "platform.system() != 'Windows'"
excludes = ["windows"]
