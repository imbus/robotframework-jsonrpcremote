paths = ["tests/robot"]
output-dir = "results"
default-profiles = ["windows"]
#log-level = "TRACE"

# Selected by default but only active on Windows, where stdio (POSIX-only) e2e
# suites are excluded. Inactive elsewhere, so other OSes run the full suite.
[profiles.windows]
enabled.if = "platform.system() == 'Windows'"
excludes = ["posix"]
