name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The unit tests import the server package and the robot suites spawn it,
      # but uv sync/run target only the workspace root by default -- so operate on
      # all workspace members. (--all-packages is needed on `uv run` too, since it
      # re-syncs exactly by default and would otherwise prune the extra members.)
      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Unit tests
        run: uv run --all-packages pytest

      # paths, output-dir and the Windows-only exclude come from robot.toml.
      - name: Robot integration tests
        run: uv run --all-packages robotcode run

      - name: Upload Robot results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.os }}
          path: results/
